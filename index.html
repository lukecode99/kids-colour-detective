<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Colour Detective</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0E1A; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100dvh; }
    #app { position: relative; width: 100%; height: 100dvh; display: flex; flex-direction: column; }

    #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvas { display: none; }

    #top-overlay {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: flex-end; padding: 52px 16px 12px;
    }
    #toggle {
      display: flex; background: rgba(0,0,0,0.5); border-radius: 24px; padding: 4px;
    }
    .pill {
      padding: 8px 18px; border-radius: 20px; border: none; background: transparent;
      color: rgba(255,255,255,0.55); font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .pill.active { background: #7B61FF; color: #fff; }
    #voice-btn {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.55);
      font-size: 20px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s; margin-left: 10px;
    }
    #voice-btn.active { background: #7B61FF; color: #fff; }

    #crosshair {
      position: absolute; top: 50%; left: 50%; z-index: 10;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }
    #crosshair-circle {
      width: 140px; height: 140px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.8);
      position: relative;
      animation: breathe 2s ease-in-out infinite;
    }
    #crosshair-h {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 2px; background: rgba(255,255,255,0.8); border-radius: 1px;
    }
    #crosshair-v {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 2px; height: 20px; background: rgba(255,255,255,0.8); border-radius: 1px;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    #bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(13,14,26,0.92); padding-bottom: 34px;
    }
    #swatch { height: 8px; width: 100%; transition: background-color 0.4s ease; }
    #color-info { padding: 14px 24px 4px; }
    #color-name {
      color: #fff; font-size: clamp(32px, 10vw, 48px); font-weight: 800; letter-spacing: -1px;
      transition: opacity 0.3s;
    }
    #color-hex { color: rgba(255,255,255,0.55); font-size: 20px; font-weight: 600; margin-top: 2px; display: none; }

    /* Brand filter */
    #brand-filter-row {
      padding: 8px 16px 0; display: flex; align-items: center; gap: 8px; position: relative;
    }
    #brand-filter-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.1); border: none; border-radius: 20px;
      color: #fff; font-size: 12px; font-weight: 700; padding: 6px 12px;
      cursor: pointer; transition: background 0.2s;
    }
    #brand-filter-btn:active { background: rgba(255,255,255,0.18); }
    #brand-count {
      background: #7B61FF; color: #fff; border-radius: 10px;
      font-size: 10px; font-weight: 800; padding: 1px 6px; min-width: 16px; text-align: center;
    }
    #brand-dropdown {
      position: absolute; bottom: calc(100% + 6px); left: 16px;
      background: #1a1b2e; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 6px; z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
    }
    #brand-dropdown.open { display: block; }
    .brand-option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer; border-radius: 10px;
      color: #fff; font-size: 14px; font-weight: 600;
      transition: background 0.15s; white-space: nowrap;
    }
    .brand-option:hover { background: rgba(255,255,255,0.08); }
    .brand-option input[type=checkbox] {
      width: 18px; height: 18px; accent-color: #7B61FF; cursor: pointer; flex-shrink: 0;
    }

    /* Paint matches */
    #paint-matches {
      display: flex; gap: 8px; padding: 8px 16px 0;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    #paint-matches::-webkit-scrollbar { display: none; }
    .paint-chip {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08); border-radius: 12px;
      padding: 7px 10px; flex-shrink: 0; min-width: 0;
      cursor: default;
    }
    .chip-swatch {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.15);
    }
    .chip-text { min-width: 0; }
    .chip-name {
      color: #fff; font-size: 12px; font-weight: 700;
      white-space: nowrap; max-width: 130px;
      overflow: hidden; text-overflow: ellipsis;
    }
    .chip-brand { color: rgba(255,255,255,0.45); font-size: 10px; font-weight: 600; white-space: nowrap; }

    #permission-screen {
      position: absolute; inset: 0; z-index: 20;
      background: #0D0E1A; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px; text-align: center;
    }
    #permission-screen h1 { color: #fff; font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    #permission-screen p { color: rgba(255,255,255,0.55); font-size: 16px; margin-bottom: 24px; }
    #allow-btn {
      background: #7B61FF; color: #fff; border: none; border-radius: 30px;
      padding: 14px 32px; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    #error-screen {
      position: absolute; inset: 0; z-index: 20;
      background: #0D0E1A; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px; text-align: center;
      display: none;
    }
    #error-screen h1 { color: #fff; font-size: 24px; font-weight: 800; margin-bottom: 12px; }
    #error-screen p { color: rgba(255,255,255,0.55); font-size: 15px; line-height: 1.5; }
  </style>
</head>
<body>
<div id="app">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" width="5" height="5"></canvas>

  <div id="permission-screen">
    <h1>📷 Camera Access Needed</h1>
    <p>Colour Detective uses your camera to detect colours around you!</p>
    <button id="allow-btn" onclick="startCamera()">Allow Camera</button>
  </div>

  <div id="error-screen">
    <h1>😕 Camera Unavailable</h1>
    <p id="error-msg">Camera access was denied or is unavailable on this browser.</p>
  </div>

  <div id="top-overlay">
    <div id="toggle">
      <button class="pill active" id="simple-btn" onclick="setMode(false)">Simple</button>
      <button class="pill" id="complex-btn" onclick="setMode(true)">Complex</button>
    </div>
    <button id="voice-btn" onclick="toggleVoice()" title="Toggle voice">🔇</button>
  </div>

  <div id="crosshair">
    <div id="crosshair-circle">
      <div id="crosshair-h"></div>
      <div id="crosshair-v"></div>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="swatch" style="background-color: #808080"></div>
    <div id="color-info">
      <div id="color-name">🔍 Detecting…</div>
      <div id="color-hex">#808080</div>
    </div>
    <div id="brand-filter-row">
      <button id="brand-filter-btn" onclick="toggleBrandDropdown()">
        🎨 Brands <span id="brand-count">2</span>
      </button>
      <div id="brand-dropdown">
        <label class="brand-option">
          <input type="checkbox" value="RAL" checked onchange="updateBrandFilter()"> RAL Classic
        </label>
        <label class="brand-option">
          <input type="checkbox" value="F&B" checked onchange="updateBrandFilter()"> Farrow &amp; Ball
        </label>
      </div>
    </div>
    <div id="paint-matches"></div>
  </div>
</div>

<script>
let complexMode = false;
let scanning = false;
let voiceOn = false;
let lastSpokenName = '';
const recentNames = [];
let selectedBrands = new Set(['RAL', 'F&B']);
let lastR = null, lastG = null, lastB = null;

function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voice-btn');
  btn.textContent = voiceOn ? '🔊' : '🔇';
  btn.className = voiceOn ? 'active' : '';
  if (voiceOn && window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance('');
    window.speechSynthesis.speak(u);
  }
}

function speakColor(name) {
  if (!voiceOn || !window.speechSynthesis || name === lastSpokenName) return;
  lastSpokenName = name;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(name);
  u.rate = 0.9; u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}

function setMode(complex) {
  complexMode = complex;
  document.getElementById('simple-btn').className = 'pill' + (!complex ? ' active' : '');
  document.getElementById('complex-btn').className = 'pill' + (complex ? ' active' : '');
  document.getElementById('color-hex').style.display = complex ? 'block' : 'none';
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    document.getElementById('permission-screen').style.display = 'none';
    startScanning();
  } catch (err) {
    document.getElementById('permission-screen').style.display = 'none';
    const errScreen = document.getElementById('error-screen');
    errScreen.style.display = 'flex';
    document.getElementById('error-msg').textContent =
      err.name === 'NotAllowedError'
        ? 'Camera permission was denied. Tap allow when prompted, or check your browser settings.'
        : 'Could not access camera: ' + err.message;
  }
}

function startScanning() {
  setInterval(sampleColor, 1000);
}

function sampleColor() {
  if (scanning) return;
  scanning = true;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if (!video.videoWidth) { scanning = false; return; }

  const ctx = canvas.getContext('2d');
  const sw = Math.floor(video.videoWidth * 0.12);
  const sh = Math.floor(video.videoHeight * 0.12);
  const sx = Math.floor((video.videoWidth - sw) / 2);
  const sy = Math.floor((video.videoHeight - sh) / 2);
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, 5, 5);
  const pixels = ctx.getImageData(0, 0, 5, 5).data;

  let rSum = 0, gSum = 0, bSum = 0;
  for (let i = 0; i < 25; i++) {
    rSum += pixels[i * 4];
    gSum += pixels[i * 4 + 1];
    bSum += pixels[i * 4 + 2];
  }
  const r = Math.round(rSum / 25);
  const g = Math.round(gSum / 25);
  const b = Math.round(bSum / 25);

  const info = getColorInfo(r, g, b, complexMode);

  recentNames.push(info.name);
  if (recentNames.length > 3) recentNames.shift();
  const counts = {};
  recentNames.forEach(n => counts[n] = (counts[n] || 0) + 1);
  const dominant = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
  if (dominant[1] >= 2) updateUI(info, r, g, b);

  scanning = false;
}

function updateUI({ name, hex, emoji }, r, g, b) {
  const nameEl = document.getElementById('color-name');
  nameEl.style.opacity = '0.5';
  setTimeout(() => {
    nameEl.textContent = emoji + ' ' + name;
    nameEl.style.opacity = '1';
    document.getElementById('swatch').style.backgroundColor = hex;
    document.getElementById('color-hex').textContent = hex;
    speakColor(name);
    renderPaintMatches(r, g, b);
  }, 150);
}

// ---- Brand filter ----
function toggleBrandDropdown() {
  const dd = document.getElementById('brand-dropdown');
  dd.classList.toggle('open');
  document.addEventListener('click', closeBrandDropdownOutside, { once: true, capture: true });
}
function closeBrandDropdownOutside(e) {
  const btn = document.getElementById('brand-filter-btn');
  const dd = document.getElementById('brand-dropdown');
  if (!btn.contains(e.target) && !dd.contains(e.target)) {
    dd.classList.remove('open');
  } else {
    document.addEventListener('click', closeBrandDropdownOutside, { once: true, capture: true });
  }
}
function updateBrandFilter() {
  const boxes = document.querySelectorAll('#brand-dropdown input[type=checkbox]');
  selectedBrands = new Set([...boxes].filter(b => b.checked).map(b => b.value));
  if (selectedBrands.size === 0) {
    boxes[0].checked = true;
    selectedBrands.add(boxes[0].value);
  }
  document.getElementById('brand-count').textContent = selectedBrands.size;
  if (lastR !== null) renderPaintMatches(lastR, lastG, lastB);
}

// ---- Paint matching ----
function rgbToXyz(r, g, b) {
  let rr = r/255, gg = g/255, bb = b/255;
  rr = rr > 0.04045 ? Math.pow((rr+0.055)/1.055, 2.4) : rr/12.92;
  gg = gg > 0.04045 ? Math.pow((gg+0.055)/1.055, 2.4) : gg/12.92;
  bb = bb > 0.04045 ? Math.pow((bb+0.055)/1.055, 2.4) : bb/12.92;
  return [
    (rr*0.4124 + gg*0.3576 + bb*0.1805)/0.95047,
    (rr*0.2126 + gg*0.7152 + bb*0.0722)/1.00000,
    (rr*0.0193 + gg*0.1192 + bb*0.9505)/1.08883
  ];
}
function labF(t) { return t > 0.008856 ? Math.cbrt(t) : (7.787*t + 16/116); }
function rgbToLab(r, g, b) {
  const [x,y,z] = rgbToXyz(r,g,b);
  const fx=labF(x), fy=labF(y), fz=labF(z);
  return [116*fy-16, 500*(fx-fy), 200*(fy-fz)];
}

function findNearestPaints(r, g, b, n) {
  const [L,A,B] = rgbToLab(r,g,b);
  const pool = selectedBrands.size === 0 ? PAINTS : PAINTS.filter(p => selectedBrands.has(p[5]));
  const scored = pool.map(p => {
    const dL=L-p[0], dA=A-p[1], dB=B-p[2];
    return { de: Math.sqrt(dL*dL+dA*dA+dB*dB), hex: p[3], name: p[4], brand: p[5] };
  });
  scored.sort((a,b) => a.de - b.de);
  return scored.slice(0, n);
}

function renderPaintMatches(r, g, b) {
  lastR = r; lastG = g; lastB = b;
  const matches = findNearestPaints(r, g, b, 3);
  const el = document.getElementById('paint-matches');
  el.innerHTML = matches.map(m => `
    <div class="paint-chip">
      <div class="chip-swatch" style="background:${m.hex}"></div>
      <div class="chip-text">
        <div class="chip-name">${m.name}</div>
        <div class="chip-brand">${m.brand}</div>
      </div>
    </div>
  `).join('');
}

// ---- Colour naming logic ----
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      default: h = ((r - g) / d + 4) / 6;
    }
  }
  return [h * 360, s, l];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function getColorInfo(r, g, b, complex) {
  const hex = rgbToHex(r, g, b);
  const [h, s, l] = rgbToHsl(r, g, b);

  if (l > 0.90) return { name: 'White', hex, emoji: '🤍' };
  if (l < 0.10) return { name: 'Black', hex, emoji: '🖤' };

  if (s < 0.12) {
    if (l < 0.22) return { name: 'Black', hex, emoji: '🖤' };
    if (l < 0.40) return { name: complex ? 'Charcoal' : 'Dark Grey', hex, emoji: '🩶' };
    if (l < 0.60) return { name: 'Grey', hex, emoji: '🩶' };
    if (l < 0.82) return { name: complex ? 'Silver' : 'Light Grey', hex, emoji: '🩶' };
    return { name: complex ? 'Off-White' : 'White', hex, emoji: '🤍' };
  }

  if (h >= 15 && h < 45 && s < 0.55 && l < 0.50) {
    if (!complex) return { name: 'Brown', hex, emoji: '🤎' };
    if (l < 0.28) return { name: 'Chocolate', hex, emoji: '🤎' };
    if (l < 0.40) return { name: 'Brown', hex, emoji: '🤎' };
    return { name: 'Tan', hex, emoji: '🤎' };
  }

  if (h >= 30 && h < 60 && s < 0.35 && l >= 0.70) {
    return { name: 'Beige', hex, emoji: '🤍' };
  }

  const name = complex ? getComplexName(h, s, l) : getSimpleName(h, s, l);
  const emoji = getEmoji(h, s, l);
  return { name, hex, emoji };
}

function getSimpleName(h, s, l) {
  if (h < 12 || h >= 348) return l > 0.62 ? 'Pink' : 'Red';
  if (h < 20) return l > 0.70 ? 'Pink' : 'Red';
  if (h < 48) return 'Orange';
  if (h < 72) return 'Yellow';
  if (h < 158) return 'Green';
  if (h < 178) return 'Teal';
  if (h < 258) return 'Blue';
  if (h < 288) return 'Purple';
  if (h < 330) return 'Pink';
  return l > 0.62 ? 'Pink' : 'Red';
}

function getComplexName(h, s, l) {
  if (h < 8 || h >= 350) {
    if (l > 0.75) return 'Blush';
    if (l > 0.50) return 'Rose';
    if (s > 0.65) return 'Crimson';
    return 'Maroon';
  }
  if (h < 18) {
    if (l > 0.70) return 'Salmon';
    if (s > 0.70) return 'Vermillion';
    return 'Burnt Orange';
  }
  if (h < 35) {
    if (l > 0.68) return 'Peach';
    return 'Tangerine';
  }
  if (h < 48) {
    if (l > 0.68) return 'Apricot';
    return 'Amber';
  }
  if (h < 58) return l > 0.68 ? 'Cream' : 'Gold';
  if (h < 72) return l > 0.68 ? 'Lemon' : 'Yellow';
  if (h < 100) return l > 0.55 ? 'Lime' : 'Olive';
  if (h < 148) {
    if (l < 0.22) return 'Dark Green';
    if (l < 0.40) return 'Forest Green';
    if (l > 0.60) return 'Mint';
    return 'Emerald';
  }
  if (h < 178) return 'Teal';
  if (h < 198) return l > 0.60 ? 'Light Blue' : 'Cyan';
  if (h < 228) return l > 0.58 ? 'Sky Blue' : 'Cerulean';
  if (h < 258) {
    if (l < 0.25) return 'Navy';
    if (l < 0.45) return 'Royal Blue';
    return 'Cobalt';
  }
  if (h < 288) return l > 0.62 ? 'Lavender' : 'Violet';
  if (h < 325) return l > 0.68 ? 'Orchid' : s > 0.55 ? 'Magenta' : 'Purple';
  if (h < 348) return l > 0.65 ? 'Pink' : 'Raspberry';
  return 'Red';
}

function getEmoji(h, s, l) {
  if (l > 0.88) return '🤍';
  if (l < 0.12) return '🖤';
  if (h >= 15 && h < 45 && s < 0.55 && l < 0.50) return '🤎';
  if (h < 15 || h >= 345) return l > 0.65 ? '🩷' : '❤️';
  if (h < 48) return '🧡';
  if (h < 72) return '💛';
  if (h < 158) return '💚';
  if (h < 178) return '🩵';
  if (h < 258) return '💙';
  if (h < 288) return '💜';
  if (h < 345) return '🩷';
  return '❤️';
}

if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
  // Show permission screen, user taps allow
} else {
  document.getElementById('permission-screen').style.display = 'none';
  const errScreen = document.getElementById('error-screen');
  errScreen.style.display = 'flex';
  document.getElementById('error-msg').textContent = 'Your browser does not support camera access. Try Chrome on Android.';
}
